# Continuously refresh Claude skills generated by skillship.
#
# Copy this file to .github/workflows/update-skills.yml in YOUR product repo
# (the repo that consumes skillship — not skillship itself).
#
# What it does, in one cycle:
#   1. Re-crawls your vendor signals via `skillship init` (overwrites
#      .skillship/config.yaml with whatever is currently discoverable).
#   2. Re-renders skills via `skillship build --out skills`.
#   3. If the diff touches skills/ or .skillship/config.yaml, opens a PR.
#      Otherwise exits silently.
#
# Review UX = the PR diff. No semver, no tags. Humans merge when the diff
# looks right.
#
# Required secrets / permissions:
#   - GITHUB_TOKEN with contents:write + pull-requests:write (declared below)
#   - If your vendor sources live behind auth, add those secrets to `env:`
#
# Required files committed in your repo before this runs:
#   - .skillship/config.yaml   (seeded by `skillship init` locally, reviewed,
#                               then committed; the workflow will overwrite
#                               it, and the diff is part of the PR)
#   - .skillship/overlays/     (optional human overrides; preserved)
#
# Not committed (gitignored by skillship): .skillship/sources/,
# .skillship/graph.sqlite — regenerated every run.

name: Update skills

on:
  schedule:
    # Daily at 07:00 UTC. Adjust to your cadence. Weekly is fine for stable
    # APIs; daily catches docs drift faster but opens more PRs.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

# Prevent duplicate runs stacking up if a schedule fires while one is still
# in flight. The in-progress run wins; queued duplicates are cancelled.
concurrency:
  group: skillship-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Fill in the vendor you want to refresh. These are the SAME args you
      # ran locally when you first seeded `.skillship/config.yaml`.
      SKILLSHIP_DOMAIN: https://example.com
      SKILLSHIP_GITHUB_ORG: example-org
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so peter-evans/create-pull-request can rebase cleanly.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install skillship
        run: |
          npm install -g skillship@^0.1.0

      - name: Re-discover sources
        run: |
          skillship init \
            --domain "$SKILLSHIP_DOMAIN" \
            --github "$SKILLSHIP_GITHUB_ORG"

      - name: Rebuild skills
        run: |
          skillship build --in . --out skills

      # Human review surface = this PR's diff. If nothing changed, the action
      # is a no-op (no PR opened).
      - name: Open PR with skill diff
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: skillship/auto-update
          delete-branch: true
          commit-message: "chore(skills): refresh from upstream vendor signals"
          title: "chore(skills): refresh from upstream vendor signals"
          body: |
            Automated refresh by skillship. Review the diff below before merge.

            **What to look for:**
            - Removed operations: the vendor deprecated something — confirm
              your callers are migrated.
            - Auth scheme changes: tokens/scopes may have shifted.
            - Large densification in a single op: often a docs rewrite on the
              vendor side; spot-check for accuracy.

            Dismiss this PR to skip this cycle; the next scheduled run will
            re-open it with the current diff.
          labels: |
            skills
            automated
          add-paths: |
            skills/**
            .skillship/config.yaml
