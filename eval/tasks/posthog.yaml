vendor: posthog
tasks:
  - id: list-feature-flags
    goal: "List feature flags in a project."
    expected_ops:
      - method: GET
        path: "/api/projects/{project_id}/feature_flags/"
  - id: create-feature-flag
    goal: "Create a feature flag."
    expected_ops:
      - method: POST
        path: "/api/projects/{project_id}/feature_flags/"
  - id: list-insights
    goal: "List insights in an environment."
    expected_ops:
      - method: GET
        path: "/api/environments/{environment_id}/insights/"
