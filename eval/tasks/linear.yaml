vendor: linear
# Linear's GraphQL SDL is at github.com/linear/linear packages/sdk/src/schema.graphql.
# Operations are GraphQL fields; method is QUERY|MUTATION|SUBSCRIPTION.
tasks:
  - id: list-issues
    goal: "List the 10 most recently updated issues assigned to me."
    expected_ops:
      - method: QUERY
        path: issues
  - id: get-issue
    goal: "Fetch the details of a specific issue by ID."
    expected_ops:
      - method: QUERY
        path: issue
  - id: create-issue
    goal: "Create an issue titled 'Fix login bug' in team ENG."
    expected_ops:
      - method: MUTATION
        path: issueCreate
  - id: update-issue-status
    goal: "Move issue LIN-123 to 'In Progress'."
    expected_ops:
      - method: MUTATION
        path: issueUpdate
  - id: list-projects
    goal: "List all projects in the workspace."
    expected_ops:
      - method: QUERY
        path: projects
  - id: list-teams
    goal: "List all teams in the workspace."
    expected_ops:
      - method: QUERY
        path: teams
